services:
  - type: web
    name: saurabhforge-voltchain-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: saurabhforge-voltchain-frontend
    runtime: static
    buildCommand: npm ci && npm run build:frontend
    staticPublishPath: frontend
    autoDeployTrigger: commit
    envVars:
      - key: VOLTCHAIN_API_BASE
        value: https://saurabhforge-voltchain-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
