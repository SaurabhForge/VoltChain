services:
  - type: web
    name: saurabhforge-voltchain-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      # CORS_ORIGIN: lock to the Render frontend URL in production (F6 fix)
      # Set this to your Render static site URL, e.g.:
      #   https://saurabhforge-voltchain-frontend.onrender.com
      # For the hackathon demo, wildcard is acceptable:
      - key: CORS_ORIGIN
        value: "https://saurabhforge-voltchain-frontend.onrender.com"

  - type: web
    name: saurabhforge-voltchain-frontend
    runtime: static
    buildCommand: npm ci && npm run build:frontend
    staticPublishPath: frontend
    autoDeployTrigger: commit
    envVars:
      - key: VOLTCHAIN_API_BASE
        value: https://saurabhforge-voltchain-api.onrender.com
    headers:
      # Security headers for the frontend
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
